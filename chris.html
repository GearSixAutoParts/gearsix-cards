<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #b8b8b8;
  font-family: 'Open Sans', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 20px 0 40px;
}

.card {
  width: 100%; max-width: 420px;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 10px 32px rgba(0,0,0,0.5);
  border: 1px solid #aaa;
}

/* ═══ HEADER ═══ */
.card-header {
  background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  padding: 16px 20px;
  border-bottom: 3px solid #8a8a8a;
  box-shadow: 0 1px 0 #c8c8c8 inset;
}

.card-header img {
  width: 100%;
  max-width: 260px;
  height: auto;
  display: block;
}

/* ═══ PROFILE PHOTO ═══ */
.profile-photo-wrap {
  display: flex; justify-content: center;
  margin-top: -42px;
  position: relative; z-index: 5;
}
.profile-photo {
  width: 84px; height: 84px;
  border-radius: 50%;
  border: 3px solid #aaa;
  background: #bbb;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.4);
}
.profile-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.profile-photo .initials { font-size: 30px; font-weight: 700; color: #8b0000; font-family: 'Oswald', sans-serif; line-height: 84px; }

      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.013) 3px,
      rgba(0,0,0,0.013) 4px

    #eaeaea;
}

.person-name {
  font-family: 'Oswald', sans-serif;
  font-size: 20px; font-weight: 700;
  color: #111; text-transform: uppercase; letter-spacing: 2px;
  margin-top: 10px; margin-bottom: 1px;
}
.person-title {
  font-size: 10px; color: #9b0000;
  font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px;
  margin-bottom: 1px;
}
.person-company { font-size: 12px; color: #777; margin-bottom: 14px; }

.divider {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, #ccc, transparent);
}
.divider-text {
  font-family: 'Oswald', sans-serif;
  font-size: 8px; color: #bbb; letter-spacing: 3px; text-transform: uppercase;
}

.contact-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 9px; margin-bottom: 12px;
}
.contact-item {
  display: flex; flex-direction: column; align-items: center;
  text-decoration: none;
}
.contact-item .icon-circle {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(145deg, #e2e2e2, #bcbcbc);
  border: 1px solid #aaa;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
  transition: all 0.2s;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.18), -1px -1px 3px rgba(255,255,255,0.9);
}
.contact-item:hover .icon-circle {
  background: linear-gradient(145deg, #8b0000, #c0392b);
  transform: scale(1.07);
  box-shadow: 2px 2px 8px rgba(139,0,0,0.4);
}
.contact-item .icon-circle i { color: #8b0000; font-size: 14px; transition: color 0.2s; }
.contact-item:hover .icon-circle i { color: #fff; }
.contact-item .icon-label { font-size: 8px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

.save-btn {

  background: linear-gradient(135deg, #7a0000 0%, #c0392b 50%, #7a0000 100%);

  margin: 4px 0 12px; width: 84%;

}
.save-btn:hover { background: linear-gradient(135deg, #a00000 0%, #e04030 50%, #a00000 100%); }

.address-section {

.social-section {

.social-link:hover { background: linear-gradient(145deg, #8b0000, #c0392b); }
.social-link i { color: #8b0000; font-size: 13px; transition: color 0.2s; }
.social-link:hover i { color: #fff; }

/* ═══ FOOTER ═══ */
.card-footer {
